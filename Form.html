<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Form</title>

  <style>
    body {
      background-color: #0aa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    .form-container {
      background: #9b6aa5;
      padding: 30px;
      width: 300px;
      border: 3px solid #00e6e6;
      position: relative;
    }


    label {
      display: block;
      margin: 10px 0 5px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #cfcfcf;
      margin-bottom: 15px;
      outline: none;
    }

    textarea {
      height: 120px;
      border-radius: 15px;
      resize: none;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 20px;
      background: #d9d9d9;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      transform: scale(2);
      animation-name: My anime;
      animation-duration: 2s;
      background: #bfbfbf;
    }
  </style>

</head>
<body>

  <div class="form-container">
    <form>
      <label>Email:</label>
      <input type="email" placeholder="Provide Your Email...">

      <label>Name:</label>
      <input type="text" placeholder="Provide Your Name...">

      <label>Message:</label>
      <textarea placeholder="Provide Your Message..."></textarea>

      <button style="background-color: aquamarine">Submit</button>
    </form>
  </div>

</body>
</html>
