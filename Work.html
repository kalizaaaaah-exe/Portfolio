<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning Assignment</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
        }

        /* 1. Parent container */
        .parent {
            position: relative;
            width: 100%;
            height: 300px;
            background-color: lightgray;
            overflow: hidden;
        }

        /* 2. Child div */
        .child {
            position: absolute;

            bottom: -50px;
            right: -80px;

            width: 150px;
            height: 150px;
            background-color: orange;

            transform: rotate(45deg);
        }
    </style>
</head>

<body>

    <div class="parent">
        <div class="child"></div>
    </div>

</body>
</html>
